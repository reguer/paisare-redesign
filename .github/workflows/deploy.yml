name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: astro-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: astro-site

      - name: Build Astro
        run: npm run build
        working-directory: astro-site
        env:
          PUBLIC_SANITY_PROJECT_ID: ${{ secrets.PUBLIC_SANITY_PROJECT_ID }}
          PUBLIC_SANITY_DATASET:    production
          PUBLIC_WEB3FORMS_KEY:     ${{ secrets.PUBLIC_WEB3FORMS_KEY }}
          SANITY_API_TOKEN:         ${{ secrets.SANITY_API_TOKEN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken:      ${{ secrets.CF_API_TOKEN }}
          accountId:     ${{ secrets.CF_ACCOUNT_ID }}
          projectName:   paisare-web
          directory:     astro-site/dist
          gitHubToken:   ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'
